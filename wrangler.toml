name = "llm-hub"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "dev"

# D1 Database for usage tracking and billing
# [[d1_databases]]
# binding = "DB"
# database_name = "llm-hub-db"
# database_id = ""
# migrations_dir = "migrations"

# KV Namespace for API keys and configurations
[[kv_namespaces]]
binding = "KV"
id = "74d8c4248b9c42039845bc9f837297a9"

#
# Production environment
#
[env.production]
name = "llm-hub"
logpush = true

[env.production.vars]
ENVIRONMENT = "production"
