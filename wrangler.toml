name = "llm-hub"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

# Workers Assets - serve static frontend files
[assets]
directory = "./public"

[vars]
ENVIRONMENT = "dev"
# Admin dashboard access token (change this in production!)
ADMIN_TOKEN = "llmhub_admin_change_me_in_production"

# D1 Database for usage tracking and billing
[[d1_databases]]
binding = "DB"
database_name = "llm-hub-db"
database_id = "81f82b7a-4329-43c8-80ce-dd93d4b240f3"
migrations_dir = "migrations"

# KV Namespace for API keys and configurations
[[kv_namespaces]]
binding = "KV"
id = "74d8c4248b9c42039845bc9f837297a9"

#
# Production environment
#
[env.production]
name = "llm-hub"
logpush = true

[env.production.vars]
ENVIRONMENT = "production"
