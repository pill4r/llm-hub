<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM-Hub Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f23;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
  }
  h1 { color: #00d4aa; margin-bottom: 8px; }
  .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
  .card {
    background: #1a1a2e;
    border: 1px solid #2a2a4e;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .card h2 {
    color: #00d4aa;
    font-size: 18px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
  input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    background: #0f0f23;
    border: 1px solid #2a2a4e;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 14px;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #00d4aa;
  }
  textarea { min-height: 80px; resize: vertical; font-family: monospace; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }

  button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  .btn-primary { background: #00d4aa; color: #0f0f23; }
  .btn-secondary { background: #2a2a4e; color: #e0e0e0; }
  .btn-danger { background: #e53e3e; color: white; }
  .btn-group { display: flex; gap: 10px; margin-top: 16px; }

  .provider-list, .key-list { display: flex; flex-direction: column; gap: 10px; }
  .provider-item, .key-item {
    background: #0f0f23;
    border: 1px solid #2a2a4e;
    border-radius: 8px;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .provider-item .info, .key-item .info { flex: 1; }
  .provider-item .name, .key-item .name { font-weight: 500; color: #e0e0e0; }
  .provider-item .meta, .key-item .meta { font-size: 12px; color: #888; margin-top: 4px; }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 8px;
  }
  .badge-green { background: #004d3d; color: #00d4aa; }
  .badge-blue { background: #1a365d; color: #63b3ed; }
  .badge-gray { background: #2d2d2d; color: #aaa; }
  .badge-red { background: #4d0000; color: #ff6b6b; }

  .result {
    margin-top: 12px;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
  }
  .result.success { background: #004d3d; color: #00d4aa; display: block; }
  .result.error { background: #3d0000; color: #ff6b6b; display: block; }
  .result pre { white-space: pre-wrap; word-break: break-all; font-family: monospace; font-size: 12px; }

  .loading { opacity: 0.6; pointer-events: none; }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid #2a2a4e;
    border-top-color: #00d4aa;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .models-preview {
    max-height: 200px;
    overflow-y: auto;
    background: #0f0f23;
    border: 1px solid #2a2a4e;
    border-radius: 8px;
    padding: 10px;
    margin-top: 10px;
  }
  .models-preview .model-tag {
    display: inline-block;
    font-size: 12px;
    padding: 2px 8px;
    margin: 2px;
    background: #1a365d;
    color: #63b3ed;
    border-radius: 4px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid #2a2a4e;
    padding-bottom: 0;
  }
  .tab {
    padding: 10px 20px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: #888;
    cursor: pointer;
    font-size: 14px;
  }
  .tab.active {
    color: #00d4aa;
    border-bottom-color: #00d4aa;
  }
  .tab:hover { color: #e0e0e0; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #1a1a2e;
    border: 1px solid #2a2a4e;
    border-radius: 12px;
    padding: 24px;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h3 { color: #00d4aa; margin-bottom: 16px; }
  .modal-close {
    float: right;
    background: transparent;
    color: #888;
    font-size: 20px;
    padding: 0;
    width: 32px;
    height: 32px;
  }
  .modal-close:hover { color: #e0e0e0; }
  .token-display {
    background: #0f0f23;
    border: 1px solid #00d4aa;
    border-radius: 8px;
    padding: 12px;
    font-family: monospace;
    font-size: 13px;
    color: #00d4aa;
    word-break: break-all;
    margin: 10px 0;
    user-select: all;
  }

  .provider-key-row {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 10px;
    margin-bottom: 10px;
    align-items: center;
  }
  .provider-key-row input { margin-bottom: 0; }
  .provider-key-row button {
    padding: 6px 12px;
    font-size: 12px;
  }
  .small-text { font-size: 12px; color: #888; }
</style>
</head>
<body>

<h1>LLM-Hub Admin</h1>
<p class="subtitle">Provider & API Key Management</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('providers')">📊 Providers</button>
  <button class="tab" onclick="switchTab('keys')">🔑 API Keys</button>
</div>

<!-- ========== PROVIDERS TAB ========== -->
<div id="tab-providers" class="tab-panel active">

<!-- Provider List -->
<div class="card">
  <h2>📊 Providers</h2>
  <div id="providerList" class="provider-list">
    <div class="provider-item"><div class="info"><span class="name">Loading...</span></div></div>
  </div>
</div>

<!-- Add Provider -->
<div class="card">
  <h2>➕ Add / Update Provider</h2>
  <div class="row">
    <div class="form-group">
      <label>Provider ID</label>
      <input type="text" id="providerId" placeholder="e.g., siliconflow" value="">
    </div>
    <div class="form-group">
      <label>Display Name</label>
      <input type="text" id="displayName" placeholder="e.g., SiliconFlow" value="">
    </div>
  </div>
  <div class="row">
    <div class="form-group">
      <label>Protocol</label>
      <select id="protocol">
        <option value="openai-compatible">OpenAI Compatible</option>
        <option value="anthropic-compatible" disabled>Anthropic Compatible (soon)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Auth Type</label>
      <select id="authType">
        <option value="bearer">Bearer Token</option>
        <option value="api-key">api-key Header</option>
        <option value="x-api-key">x-api-key Header</option>
      </select>
    </div>
  </div>
  <div class="form-group">
    <label>Base URL</label>
    <input type="text" id="baseUrl" placeholder="https://api.example.com/v1" value="">
  </div>
  <div class="row">
    <div class="form-group">
      <label>Chat Endpoint (optional)</label>
      <input type="text" id="chatEndpoint" placeholder="/chat/completions" value="">
    </div>
    <div class="form-group">
      <label>Auto-fetch models</label>
      <select id="autoFetchModels">
        <option value="true">Yes</option>
        <option value="false">No</option>
      </select>
    </div>
  </div>
  <div class="form-group">
    <label>Models (comma-separated, if auto-fetch is off)</label>
    <input type="text" id="models" placeholder="model-a, model-b" value="">
  </div>
  <div class="form-group">
    <label>API Key (for testing)</label>
    <input type="password" id="testApiKey" placeholder="sk-..." value="">
  </div>

  <div class="btn-group">
    <button class="btn-secondary" onclick="testProvider()">🔬 Test</button>
    <button class="btn-primary" onclick="saveProvider()">💾 Save</button>
  </div>

  <div id="testResult" class="result"></div>
</div>

</div>

<!-- ========== KEYS TAB ========== -->
<div id="tab-keys" class="tab-panel">

<!-- Key List -->
<div class="card">
  <h2>🔑 API Keys</h2>
  <div id="keyList" class="key-list">
    <div class="key-item"><div class="info"><span class="name">Loading...</span></div></div>
  </div>
</div>

<!-- Create Key -->
<div class="card">
  <h2>➕ Create New Key</h2>
  <div class="row">
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="keyName" placeholder="e.g., Production App" value="">
    </div>
    <div class="form-group">
      <label>Monthly Budget (USD, 0 = unlimited)</label>
      <input type="number" id="keyBudget" value="50" min="0">
    </div>
  </div>
  <div class="row">
    <div class="form-group">
      <label>RPM (requests per minute)</label>
      <input type="number" id="keyRpm" value="60" min="1">
    </div>
    <div class="form-group">
      <label>TPM (tokens per minute)</label>
      <input type="number" id="keyTpm" value="100000" min="1">
    </div>
  </div>
  <div class="form-group">
    <label>Allowed Providers (empty = all)</label>
    <input type="text" id="keyProviders" placeholder="openai, deepseek, opencodego" value="">
    <p class="small-text">Comma-separated provider IDs. Leave empty to allow all.</p>
  </div>
  <div class="form-group">
    <label>Allowed Models (empty = all)</label>
    <input type="text" id="keyModels" placeholder="gpt-4o, deepseek-chat" value="">
    <p class="small-text">Comma-separated model IDs. Leave empty to allow all.</p>
  </div>

  <div class="form-group">
    <label>Provider API Keys</label>
    <div id="providerKeyInputs">
      <div class="provider-key-row" data-provider="openai">
        <span>openai</span>
        <input type="password" placeholder="sk-..." data-key="openai">
      </div>
      <div class="provider-key-row" data-provider="deepseek">
        <span>deepseek</span>
        <input type="password" placeholder="sk-..." data-key="deepseek">
      </div>
      <div class="provider-key-row" data-provider="opencodego">
        <span>opencodego</span>
        <input type="password" placeholder="sk-..." data-key="opencodego">
      </div>
      <div class="provider-key-row" data-provider="anthropic">
        <span>anthropic</span>
        <input type="password" placeholder="sk-ant-..." data-key="anthropic">
      </div>
    </div>
  </div>

  <div class="btn-group">
    <button class="btn-primary" onclick="createKey()">🔑 Create Key</button>
  </div>

  <div id="keyResult" class="result"></div>
</div>

</div>

<!-- ========== MODAL ========== -->
<div id="modal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3 id="modalTitle">Title</h3>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const API_BASE = '';

// ========================================================================
// Tabs
// ========================================================================

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'providers') fetchProviders();
  if (name === 'keys') fetchKeys();
}

function openModal(title, html) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('active');
}

function closeModal(e) {
  if (!e || e.target.id === 'modal') {
    document.getElementById('modal').classList.remove('active');
  }
}

// ========================================================================
// Providers
// ========================================================================

async function fetchProviders() {
  try {
    const resp = await fetch(`${API_BASE}/admin/providers`);
    const data = await resp.json();
    renderProviders(data.providers || []);
  } catch (err) {
    document.getElementById('providerList').innerHTML = `<div class="provider-item"><div class="info"><span class="name" style="color:#ff6b6b">Error: ${err.message}</span></div></div>`;
  }
}

function renderProviders(providers) {
  const el = document.getElementById('providerList');
  if (!providers.length) {
    el.innerHTML = '<div class="provider-item"><div class="info"><span class="name" style="color:#888">No providers configured</span></div></div>';
    return;
  }
  el.innerHTML = providers.map(p => `
    <div class="provider-item">
      <div class="info">
        <div>
          <span class="name">${escapeHtml(p.displayName || p.providerId)}</span>
          <span class="badge ${p.source === 'builtin' ? 'badge-blue' : 'badge-green'}">${p.source}</span>
          <span class="badge badge-gray">${p.protocol || 'custom'}</span>
        </div>
        <div class="meta">
          ID: ${p.providerId} ·
          ${p.baseUrl || ''} ·
          ${typeof p.models === 'number' ? p.models + ' models' : (p.models?.length || 0) + ' models'}
        </div>
      </div>
      ${p.source === 'dynamic' ? `<button class="btn-danger" style="padding:6px 12px;font-size:12px" onclick="deleteProvider('${p.providerId}')">✕</button>` : ''}
    </div>
  `).join('');
}

async function testProvider() {
  const btn = document.querySelector('button[onclick="testProvider()"]');
  const result = document.getElementById('testResult');
  btn.classList.add('loading');
  result.className = 'result';
  result.textContent = '';

  const config = getFormConfig();
  const apiKey = document.getElementById('testApiKey').value;

  try {
    const resp = await fetch(`${API_BASE}/admin/providers/test`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ config, apiKey }),
    });
    const data = await resp.json();

    if (data.result?.ok) {
      result.className = 'result success';
      let html = `✅ Connected! Latency: ${data.result.latencyMs}ms\n`;
      html += `Response: ${JSON.stringify(data.response, null, 2)}\n`;
      if (data.result.models?.length) {
        html += `\nModels found: ${data.result.models.length}\n`;
        html += `<div class="models-preview">${data.result.models.map(m => `<span class="model-tag">${escapeHtml(m.id)}</span>`).join('')}</div>`;
      }
      result.innerHTML = `<pre>${html}</pre>`;
    } else {
      result.className = 'result error';
      result.innerHTML = `<pre>❌ Failed: ${escapeHtml(data.result?.error || 'Unknown error')}</pre>`;
    }
  } catch (err) {
    result.className = 'result error';
    result.innerHTML = `<pre>❌ Error: ${escapeHtml(err.message)}</pre>`;
  } finally {
    btn.classList.remove('loading');
  }
}

async function saveProvider() {
  const btn = document.querySelector('button[onclick="saveProvider()"]');
  const result = document.getElementById('testResult');
  btn.classList.add('loading');

  const config = getFormConfig();

  try {
    const resp = await fetch(`${API_BASE}/admin/providers/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config),
    });
    const data = await resp.json();

    if (data.success) {
      result.className = 'result success';
      result.innerHTML = `<pre>✅ Provider ${data.action}: ${data.providerId}</pre>`;
      fetchProviders();
    } else {
      result.className = 'result error';
      result.innerHTML = `<pre>❌ ${escapeHtml(data.error?.message || 'Failed')}</pre>`;
    }
  } catch (err) {
    result.className = 'result error';
    result.innerHTML = `<pre>❌ ${escapeHtml(err.message)}</pre>`;
  } finally {
    btn.classList.remove('loading');
  }
}

async function deleteProvider(providerId) {
  if (!confirm(`Delete provider "${providerId}"?`)) return;
  try {
    const resp = await fetch(`${API_BASE}/admin/providers/${providerId}`, { method: 'DELETE' });
    const data = await resp.json();
    if (data.success) {
      fetchProviders();
    } else {
      alert(data.error?.message || 'Failed to delete');
    }
  } catch (err) {
    alert(err.message);
  }
}

function getFormConfig() {
  const modelsStr = document.getElementById('models').value;
  return {
    providerId: document.getElementById('providerId').value,
    displayName: document.getElementById('displayName').value,
    protocol: document.getElementById('protocol').value,
    baseUrl: document.getElementById('baseUrl').value,
    authType: document.getElementById('authType').value,
    chatEndpoint: document.getElementById('chatEndpoint').value || undefined,
    autoFetchModels: document.getElementById('autoFetchModels').value === 'true',
    models: modelsStr ? modelsStr.split(',').map(s => ({ id: s.trim(), name: s.trim() })).filter(m => m.id) : [],
    createdAt: new Date().toISOString(),
  };
}

// ========================================================================
// Keys
// ========================================================================

async function fetchKeys() {
  try {
    const resp = await fetch(`${API_BASE}/admin/keys`);
    const data = await resp.json();
    renderKeys(data.keys || []);
  } catch (err) {
    document.getElementById('keyList').innerHTML = `<div class="key-item"><div class="info"><span class="name" style="color:#ff6b6b">Error: ${err.message}</span></div></div>`;
  }
}

function renderKeys(keys) {
  const el = document.getElementById('keyList');
  if (!keys.length) {
    el.innerHTML = '<div class="key-item"><div class="info"><span class="name" style="color:#888">No API keys configured</span></div></div>';
    return;
  }
  el.innerHTML = keys.map(k => `
    <div class="key-item">
      <div class="info">
        <div>
          <span class="name">${escapeHtml(k.name)}</span>
          <span class="badge ${k.active ? 'badge-green' : 'badge-red'}">${k.active ? 'active' : 'inactive'}</span>
        </div>
        <div class="meta">
          ID: ${k.keyId} ·
          Token: ${k.tokenPrefix} ·
          Budget: $${k.monthlyBudget || '∞'}/mo ·
          Used: $${k.currentSpend?.toFixed?.(2) || '0'} ·
          RPM: ${k.rpm} · TPM: ${k.tpm}
          ${k.allowedProviders?.length ? '· Providers: ' + k.allowedProviders.join(', ') : ''}
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-secondary" style="padding:6px 12px;font-size:12px" onclick="showKeyDetail('${k.keyId}')">👁</button>
        <button class="btn-danger" style="padding:6px 12px;font-size:12px" onclick="deleteKey('${k.keyId}')">✕</button>
      </div>
    </div>
  `).join('');
}

async function createKey() {
  const btn = document.querySelector('button[onclick="createKey()"]');
  const result = document.getElementById('keyResult');
  btn.classList.add('loading');
  result.className = 'result';

  const providersStr = document.getElementById('keyProviders').value;
  const modelsStr = document.getElementById('keyModels').value;

  // Collect provider keys
  const providerKeys = {};
  document.querySelectorAll('#providerKeyInputs input[data-key]').forEach(input => {
    const val = input.value.trim();
    if (val) {
      providerKeys[input.dataset.key] = { apiKey: val };
    }
  });

  const body = {
    name: document.getElementById('keyName').value || 'Untitled',
    monthlyBudget: Number(document.getElementById('keyBudget').value) || 0,
    rpm: Number(document.getElementById('keyRpm').value) || 60,
    tpm: Number(document.getElementById('keyTpm').value) || 100000,
    allowedProviders: providersStr ? providersStr.split(',').map(s => s.trim()).filter(Boolean) : [],
    allowedModels: modelsStr ? modelsStr.split(',').map(s => s.trim()).filter(Boolean) : [],
    providerKeys,
  };

  try {
    const resp = await fetch(`${API_BASE}/admin/keys`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await resp.json();

    if (data.success) {
      result.className = 'result success';
      result.innerHTML = `
        <pre>✅ Key created!</pre>
        <p class="small-text" style="margin-top:8px">Copy this token now — it won't be shown again:</p>
        <div class="token-display">${data.key.token}</div>
      `;
      fetchKeys();
      // Clear form
      document.getElementById('keyName').value = '';
      document.querySelectorAll('#providerKeyInputs input').forEach(i => i.value = '');
    } else {
      result.className = 'result error';
      result.innerHTML = `<pre>❌ ${escapeHtml(data.error?.message || 'Failed')}</pre>`;
    }
  } catch (err) {
    result.className = 'result error';
    result.innerHTML = `<pre>❌ ${escapeHtml(err.message)}</pre>`;
  } finally {
    btn.classList.remove('loading');
  }
}

async function showKeyDetail(keyId) {
  try {
    const resp = await fetch(`${API_BASE}/admin/keys/${keyId}`);
    const data = await resp.json();
    if (!data.key) {
      alert('Key not found');
      return;
    }

    const pkRows = (data.providerKeys || []).map(pk => `
      <div class="provider-key-row">
        <span>${pk.providerId}</span>
        <input type="text" value="${pk.apiKey.slice(0, 8)}..." readonly style="background:#0f0f23">
      </div>
    `).join('');

    openModal(data.key.name, `
      <p><strong>Key ID:</strong> ${data.key.keyId}</p>
      <p><strong>Status:</strong> ${data.key.active ? '<span style="color:#00d4aa">Active</span>' : '<span style="color:#ff6b6b">Inactive</span>'}</p>
      <p><strong>Budget:</strong> $${data.key.monthlyBudget || '∞'}/mo · <strong>Used:</strong> $${data.currentSpend?.toFixed?.(2) || '0'} (${data.month})</p>
      <p><strong>RPM:</strong> ${data.key.rpm} · <strong>TPM:</strong> ${data.key.tpm}</p>
      ${data.key.allowedProviders?.length ? `<p><strong>Providers:</strong> ${data.key.allowedProviders.join(', ')}</p>` : ''}
      ${data.key.allowedModels?.length ? `<p><strong>Models:</strong> ${data.key.allowedModels.join(', ')}</p>` : ''}
      <p style="margin-top:12px"><strong>Provider Keys:</strong></p>
      ${pkRows || '<p class="small-text">No provider keys configured</p>'}
    `);
  } catch (err) {
    alert(err.message);
  }
}

async function deleteKey(keyId) {
  if (!confirm(`Delete key "${keyId}"? This cannot be undone.`)) return;
  try {
    const resp = await fetch(`${API_BASE}/admin/keys/${keyId}`, { method: 'DELETE' });
    const data = await resp.json();
    if (data.success) {
      fetchKeys();
    } else {
      alert(data.error?.message || 'Failed to delete');
    }
  } catch (err) {
    alert(err.message);
  }
}

// ========================================================================
// Utils
// ========================================================================

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Load on page load
fetchProviders();
</script>
